[package]
name = "numerical-accuracy"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 32 — numerical accuracy (the gap between ideal real arithmetic over R and finite-precision IEEE-754 f64 over the representable set F) as typestate. leaf 27 (unit-types)'s ANALYTIC COUSIN: where unit-types' residue is ALGEBRAIC ('is the conversion FACTOR right?' — a static parameter a wrong value type-checks past, the Mars Climate Orbiter class), this leaf is its analytic deepening — even with the RIGHT factor, applied to specific data in f64, accuracy is destroyed by CONDITIONING. It also picks up dp-types (leaf 28)'s own dangling thread: dp-28 explicitly wrote 'the arithmetic residue goes one level deeper — finite precision (1.0 - 1e-20 == 1.0)' and LEFT it; this leaf IS that residue, made its own. Thesis: does numerical accuracy reduce to the four compile primitives? -> a THREE-WAY split, two primitives touched, no new one. reduce-half (what DOES reduce). (1) The DATA-INDEPENDENT bound via E0080: for a backward-stable straight-line computation, the BACKWARD error (equivalently a worst-case rounding-STEP count) is a function of the OPERATIONS, not the values — it accumulates MONOTONELY and can be walled at compile time. ulp_budget(err_ulps, tol) is a const fn whose assert trips E0080 ('round-off budget exceeded') when the accumulated worst-case step count exceeds a declared tolerance — the DEPLETING WALL of static-config (leaf 6) and dp (leaf 28), now measuring accumulated round-off instead of a k-of-n count or a privacy loss. (2) The CERTIFICATE seal via E0451: Tracked is a sealed newtype (private value + err_ulps + _seal fields) minted only by exact() or a tracked op, so a downstream holder carries 'this f64 arrived WITH an error-step certificate' — the enforcement skeleton, cf. refinement-types (leaf 31)'s Refined receipt. residue (what does NOT reduce), the NEW SHAPE being the VALUE-DEPENDENT residue. The accuracy a user actually cares about is the FORWARD error, and the textbook decomposition (Higham, 'Accuracy and Stability of Numerical Algorithms'; Trefethen-Bau) is forward-error ~= kappa(x) * backward-error, where kappa is the CONDITION NUMBER of the problem AT THE INPUT POINT x. kappa is a function of the RUNTIME DATA: for f(a,b)=a-b, kappa = (|a|+|b|)/|a-b| -> infinity as a -> b (CATASTROPHIC CANCELLATION). So a Tracked computation ((1.0).add(1e-20)).sub(1.0) reports a tiny err_ulps (2 rounding steps) yet returns 0.0 when the true (1+1e-20)-1 = 1e-20 — a TOTAL relative error the step-count bound cannot see, because the destruction lives in the VALUES (1e-20 fell below the ULP of 1.0), which no data-INDEPENDENT type-level constant observes. This is a genuinely different residue shape from the garden's priors: NOT a missing forall-proof over a domain (crdt 15 / dp 28's 'proof obligation'), and NOT a mis-supplied static PARAMETER a caller could in principle get right (unit-27's FACTOR, dp-28's sensitivity Delta-f) — but an invariant whose very VALUE varies point-by-point at RUNTIME, structurally unreachable by a compile-time type because Rust has no f64-VALUE-parametric types (no dependent types over floats). A SECOND residue face re-instances leaf 31's ARROW: float addition is NON-ASSOCIATIVE ((a+b)+c != a+(b+c) in F: a=1.0,b=1e16,c=-1e16 gives 0.0 vs 1.0), so ACCURACY is a property of the operation ORDER / algorithm (Kahan summation, pairwise summation), not of the values — the refinement-belongs-on-the-FUNCTION residue, now for stability rather than a predicate. Primitives: E0451 central (the certificate seal) + E0080 (the round-off budget wall); E0382 is NOT RECRUITED — an error certificate is a DUPLICABLE FACT (Tracked is Copy), the deliberate inverse of dp-28's LINEAR Budget (a privacy budget must not be duplicated; an accuracy certificate may be), so E0382 governs nothing here. The E0308 brand is unused (no fresh-per-value provenance scope). Two garden primitives touched, no new one. Codes (E0451, E0080) VERIFIED by direct rustc with a real -o path (rustdoc does not machine-check ,EXXXX; E0080 is const-eval surfaced at evaluation and /dev/null can hide it — the leaf 27/29/30 rule). Standalone (imports nothing: numerical accuracy is a general analytic notion, unrelated to corona-core's k-of-n Threshold or gf256). TOY: err_ulps is an illustrative ROUNDING-STEP COUNTER (the first-order (1+delta) model's step count), NOT a validated running-error bound — it ignores intermediate-magnitude growth, which is exactly where forward-error blow-up hides; a real bound is Higham's running-error analysis. The leaf's residue argument does NOT depend on the counter's tightness — CONDITIONING (kappa(x)) defeats ANY data-independent bound, crude or exact. No interval arithmetic, no error-free transforms (TwoSum/TwoProduct), no Kahan/pairwise summation, no libm. Models the ENFORCEMENT SKELETON of an accuracy discipline, not a numerical-error analyzer. Not for real use."

