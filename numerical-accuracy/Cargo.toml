[package]
name = "numerical-accuracy"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 32 (TOY — not for real use). numerical accuracy (the gap between ideal real arithmetic over R and finite-precision IEEE-754 f64 over the representable set F) as typestate. leaf 27 (unit-types)'s ANALYTIC COUSIN: where unit-types' residue is ALGEBRAIC ('is the conversion FACTOR right?' — a static parameter a wrong value type-checks past, the Mars Climate Orbiter class), this leaf is its analytic deepening — even with the RIGHT factor, applied to specific data in f64, accuracy is destroyed by CONDITIONING. It also picks up dp-types (leaf 28)'s own dangling thread: dp-28 explicitly wrote 'the arithmetic residue goes one level deeper — finite precision (1.0 - 1e-20 == 1.0)' and LEFT it; this leaf IS that residue, made its own. Thesis: does numerical accuracy reduce to the four compile primitives? -> a THREE-WAY split, two primitives touched, no new one. reduce-half (what DOES reduce). (1) The DATA-INDEPENDENT bound via E0080: for a backward-stable straight-line computation, the BACKWARD error (proportional, in the first-order (1+delta) model, to a worst-case rounding-STEP count) is a function of the OPERATIONS, not the values — it accumulates monotonically and can be walled at compile time. ulp_budget(err_ulps, tol) is a const fn whose assert trips E0080 ('round-off budget exceeded') when the accumulated worst-case step count exceeds a declared tolerance — the DEPLETING WALL of static-config (leaf 6) and dp (leaf 28), now measuring accumulated round-off instead of a k-of-n count or a privacy loss. (2) The CERTIFICATE seal via E0451: Tracked is a sealed newtype (private value + err_ulps + _seal fields) minted only by exact() or a tracked op (from OUTSIDE the crate; in-crate it is an upheld per-crate convention — the standard sealed-newtype caveat), so a downstream holder carries 'this f64 arrived WITH an error-step certificate' — the enforcement skeleton, cf. refinement-types (leaf 31)'s Refined receipt. residue (what does NOT reduce), the NEW SHAPE being the VALUE-DEPENDENT residue. The accuracy a user actually cares about is the FORWARD error, and the textbook decomposition (Higham, 'Accuracy and Stability of Numerical Algorithms'; Trefethen-Bau) is relative forward-error <~ kappa(x) * relative backward-error (a rule-of-thumb INEQUALITY, not an equality), where kappa is the relative CONDITION NUMBER of the problem AT THE INPUT POINT x. kappa is a function of the RUNTIME DATA: for f(a,b)=a-b, kappa = (|a|+|b|)/|a-b| -> infinity as a -> b (CATASTROPHIC CANCELLATION — subtracting two nearby DISTINCT values). So a Tracked computation ((1.0).add(1e-20)).sub(1.0) — whose loss is actually ABSORPTION (1e-20 below the ULP of 1.0; the map is well-conditioned, kappa~1, so this illustrates the STABILITY axis, not conditioning) — reports a tiny err_ulps (2 rounding steps) yet returns 0.0 when the true (1+1e-20)-1 = 1e-20, a TOTAL relative error the step-count bound cannot see, because the destruction lives in the VALUES (1e-20 fell below the ULP of 1.0), which no data-INDEPENDENT type-level constant observes. This is a genuinely different residue shape from the garden's priors: sharper than its two nearest neighbours — the mis-supplied static PARAMETER (unit-27's FACTOR, dp-28's sensitivity Delta-f) and the forall-proof over a domain (crdt 15 / dp 28's 'proof obligation') — an invariant with NO FINITE WORST-CASE CONSTANT — the condition number's global supremum sup_x kappa(x) is UNBOUNDED (it diverges at the cancellation singularity a=b), so there is nothing finite to hand the E0080 wall. The distinction is sharper than 'the data varies at runtime', which alone does NOT defeat a wall: a merely BOUNDED kappa (sup kappa = K < infinity) would reduce — supply K, exactly the FACTOR/Delta-f move (the wall never needed the exact kappa(x), only a finite bound). It separates from the parameter residue (unit-27 FACTOR / dp-28 Delta-f, finite GLOBAL constants) by UNBOUNDEDNESS, and from the forall-proof residue by SUBSTRATE (kappa is a continuous function of runtime f64 VALUES — an implicit forall whose bound diverges, so this is its LIMITING CASE, not cleanly disjoint — not a logical proposition over a structural domain; even naming it needs an f64-value-parametric/dependent type Rust lacks). This is the LOCAL-vs-GLOBAL sensitivity distinction differential privacy itself rests on — Delta-f is a finite GLOBAL sensitivity (DP requires it finite), kappa a LOCAL sensitivity with no finite global sup (the parallel is on the per-input-vs-global axis ONLY: kappa is a dimensionless RELATIVE amplification that diverges POINTWISE at a=b, whereas Delta-f is an ABSOLUTE magnitude finite at every point; only the per-input-vs-global-sup structure is shared). The compile-time bound is a first-order (1+delta) BACKWARD-error PROXY (data-independent; unscaled by u and dropping the O(u^2)/gamma_n weights, so NOT a validated bound — and NOT a forward bound at all, since magnitude/conditioning is exactly what it ignores) but answers the wrong question PRECISELY WHEN ill-conditioned (sup kappa = infinity); for a well-conditioned problem it collapses to the ordinary worst-case wall — the residue is the SINGULARITY, not the runtime-ness. A SECOND residue face re-instances leaf 31's ARROW: float addition is NON-ASSOCIATIVE ((a+b)+c != a+(b+c) in F: a=1.0,b=1e16,c=-1e16 gives 0.0 vs 1.0), so ACCURACY is a property of the operation ORDER / algorithm (Kahan summation, pairwise summation), not of the values — the refinement-belongs-on-the-FUNCTION residue, now for stability rather than a predicate. Primitives: E0451 central (the certificate seal) + E0080 (the round-off budget wall); E0382 is NOT RECRUITED — an error certificate is a DUPLICABLE FACT (Tracked is Copy), the deliberate inverse of dp-28's LINEAR Budget (a privacy budget must not be duplicated; an accuracy certificate may be), so E0382 governs nothing here. The E0308 brand is unused (no fresh-per-value provenance scope). Two garden primitives touched, no new one. Codes (E0451, E0080) VERIFIED by direct rustc with a real -o path (rustdoc does not machine-check ,EXXXX; E0080 is const-eval surfaced at evaluation and /dev/null can hide it — the leaf 27/29/30 rule). Standalone (imports nothing: numerical accuracy is a general analytic notion, unrelated to corona-core's k-of-n Threshold or gf256). TOY: err_ulps is an illustrative ROUNDING-STEP COUNTER (the first-order (1+delta) model's step count), NOT a validated running-error bound — it ignores intermediate-magnitude growth, which is exactly where forward-error blow-up hides; a real bound is Higham's running-error analysis. The leaf's residue argument does NOT depend on the counter's tightness — CONDITIONING (kappa(x)) defeats ANY data-independent bound, crude or exact. No interval arithmetic, no error-free transforms (TwoSum/TwoProduct), no Kahan/pairwise summation, no libm. Models the ENFORCEMENT SKELETON of an accuracy discipline, not a numerical-error analyzer. Not for real use."

