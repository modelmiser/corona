[package]
name = "commit-types"
version = "0.2.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 26 (GRADUATED) — a cryptographic commitment (hash-based; Pedersen as the dual) as typestate. A commitment has TWO definitionally-DUAL properties — binding (the committer cannot open one commitment to two values) and hiding (the commitment reveals nothing about the value). This is the garden's first leaf where a domain's two dual properties SPLIT across the reduce/residue line. Binding's SHAPE reduces — the E0451 seal pins the value into a sealed constructor (you cannot mint a Commitment that is not the image of some (value, blind) you already held), and the E0308-class brand supplies provenance (which opening belongs to which commitment, decided at COMPILE time, not by the hash; in this generative-lifetime instantiation the concrete diagnostic is E0521, not a literal E0308). But binding's HARDNESS is a collision residue — now reduced to the collision-resistance of vetted SHA-256 (the graduated backend), which the type still cannot see (the seal type-checks identically at any hash width; narrow the hash's effective entropy and binding evaporates while the type is unchanged) — and hiding is a pure 2-safety indistinguishability residue no value-level type can express (the hiding scheme and a leaky no-blind scheme have the IDENTICAL type; only a runtime distinguisher separates them, and only if the caller supplies a fresh, secret blind — which the type cannot enforce). The binding<->hiding TRADEOFF (hash = computationally-binding + computationally-hiding, neither perfect; Pedersen = perfectly-hiding + computationally-binding) is a residue the type sees neither end of."

# commit-types is STANDALONE (imports nothing in the garden): its subject is the
# binding/hiding DUALITY of a single commitment, not a k-of-n threshold, so it does
# not lean on corona-core's Threshold.
#
# Graduated backend (CHARTER.md criterion #2): the toy 64-bit FNV-1a that the
# research rung used is replaced by domain-framed **SHA-256** (via the audited
# `sha2` crate) behind the same `hash::digest_of` seam — the seam's module and
# function names are unchanged; only the body and the `Digest` output width
# (`u64` -> `[u8; 32]`) change. Because commit-types is a NO-DEPENDENT leaf, the
# output-type widening carries **zero** blast radius (contrast the merkle hub).
# `forbid(unsafe_code)` in this crate governs *our* code, not the vetted dependency.
[dependencies]
sha2 = "0.10"
