[package]
name = "commit-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 26 — a cryptographic commitment (hash-based; Pedersen as the dual) as typestate. A commitment has TWO definitionally-DUAL properties — binding (the committer cannot open one commitment to two values) and hiding (the commitment reveals nothing about the value). This is the garden's first leaf where a domain's two dual properties SPLIT across the reduce/residue line. Binding's SHAPE reduces — the E0451 seal pins the value into a sealed constructor (you cannot mint a Commitment that is not the image of some (value, blind) you already held), and the E0308-class brand supplies provenance (which opening belongs to which commitment, decided at COMPILE time, not by the hash). But binding's HARDNESS is a collision residue (the seal type-checks identically at any hash width; narrow the hash and binding evaporates while the type is unchanged), and hiding is a pure 2-safety indistinguishability residue no value-level type can express (the hiding scheme and a leaky no-blind scheme have the IDENTICAL type; only a runtime distinguisher separates them). The binding<->hiding TRADEOFF (hash = computationally-binding + computationally-hiding, neither perfect; Pedersen = perfectly-hiding + computationally-binding) is a residue the type sees neither end of. TOY, not production."

# commit-types is STANDALONE (imports nothing in the garden): its subject is the
# binding/hiding DUALITY of a single commitment, not a k-of-n threshold, so it does
# not lean on corona-core's Threshold. It rolls its own TOY 64-bit FNV-1a hash (as
# merkle/pow/accumulator each do) — the toy that makes the checked path runnable
# without pretending to be collision-resistant; the collapse of binding under a
# narrowed hash is precisely one of the leaf's residues.
[dependencies]
