[package]
name = "deadline-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 33 (TOY — not for real use). Real-time schedulability (does every job of a periodic task set finish before its deadline?) as typestate. numerical-accuracy (leaf 32)'s PARKED COUSIN and the QUANTITATIVE SHARPENING of arq-types (leaf 24)'s liveness: leaf 24 asked 'does delivery EVENTUALLY happen?' (liveness, no finite bad prefix); this leaf asks 'does the job complete WITHIN a deadline D?' — a QUANTITATIVE deadline, the biggest gap the parked note named after dp-types (leaf 28) opened the graded/ε axis. Thesis: does schedulability reduce to the four compile primitives? -> a THREE-WAY split, two primitives touched, no new one. reduce-half (what DOES reduce). (1) The per-task NECESSARY wall + the ONE tractable EXACT test, both via E0080: (a) a task's worst-case execution time C must not exceed its (implicit) deadline D=T — assert!(C <= T) at const-eval; (b) for implicit-deadline UNIPROCESSOR EDF (earliest-deadline-first), Liu & Layland 1973's test is EXACT (necessary AND sufficient): sum of C_i/T_i <= 1 (utilization <= 100%). This sum is an integer const-eval computation (common-denominator cross-multiplication in u128, exact, no float in the wall) whose assert trips E0080 ('utilization exceeds 100%') — the DEPLETING WALL of static-config (leaf 6) and dp (leaf 28), now metering PROCESSOR UTILIZATION instead of a k-of-n count or a privacy loss. (2) The CERTIFICATE seal via E0451: Schedulable<N> is a sealed struct (private tasks + certified_by + _seal fields) minted only by an admission function (admit_edf / admit_rm_sufficient / admit_rm_exact, from OUTSIDE the crate; in-crate an upheld per-crate convention — the standard sealed-newtype caveat), so a downstream holder carries 'this task set PASSED a named schedulability test' — the enforcement skeleton, cf. numerical-accuracy (leaf 32)'s Tracked and refinement (leaf 31)'s Refined receipt. Like Tracked and unlike dp-28's Budget, the certificate is a DUPLICABLE FACT (Schedulable is Copy) — E0382 NOT recruited (a feasibility certificate may be shared; it is not a use-once capability). residue (what does NOT reduce), the NEW SHAPE = the TRACTABILITY / P-vs-NP gap. The instant you leave the one polynomial island (implicit-deadline uniprocessor EDF): (a) fixed-priority RATE-MONOTONIC scheduling has NO exact closed-form utilization wall — the Liu & Layland SUFFICIENT bound U <= n(2^(1/n) - 1) (-> ln 2 ~ 0.693) is CONSERVATIVE (it REJECTS schedulable task sets); the EXACT test is Response-Time Analysis (Joseph & Pandya 1986; Audsley et al. 1993), a pseudo-polynomial FIXED-POINT iteration R_i = C_i + sum_{j in hp(i)} ceil(R_i/T_j)*C_j — still constructible in code, but no longer a cheap comparison a const wall performs. (b) constrained/arbitrary deadlines (D < T or D > T), release jitter, and above all MULTIPROCESSOR schedulability are provably NP-hard (partitioned multiprocessor = bin-packing; static-priority response-time computation is NP-hard, Eisenbrand & Rothvoss 2008). So a compile-time wall must CHOOSE: tractable-but-conservative (a utilization bound) OR exact-but-intractable (an RTA fixed-point that a const evaluator would have to run, and for the NP-hard cases cannot run in polynomial time at all unless P=NP). The residue is precisely that GAP — the garden's first residue gated by COMPUTATIONAL COMPLEXITY (tractability) rather than decidability (totality leaf 30, which is UNDECIDABLE — halting), a conjectured lower bound (vdf leaf 20, a HARDNESS ASSUMPTION on a computation), or unboundedness (numerical-accuracy leaf 32, sup kappa = infinity). Schedulability is DECIDABLE and the incompleteness of a tractable wall is a THEOREM (unavoidable unless P=NP), not a conjecture and not an undecidability — the complexity-theoretic sibling of leaf 30's computability residue. Demonstrated EXECUTABLY (not prose-only): a harmonic task set at U=1.0 ({C=1,T=2}, {C=2,T=4}) that admit_edf ACCEPTS (U <= 1, exact), admit_rm_sufficient REJECTS (1.0 > 0.828), and admit_rm_exact ACCEPTS (RTA fixed point R meets D) — the same set, three verdicts, the utilization shortcut's conservatism made a running test. BRIDGE to leaf 24 (the elegant part): QUANTIFYING a liveness bound turns it back into SAFETY. 'Eventually delivered' (leaf 24) has no finite bad prefix (pure liveness, Alpern-Schneider); 'delivered WITHIN D' has one (the instant past D with nothing done). So this leaf does NOT re-land on leaf 24's liveness-escape residue — the hardness MIGRATES from 'no finite witness exists' (liveness) to 'a finite witness exists but is NP-hard to SEARCH FOR' (the critical-instant forall-over-arrival-phasings; Liu & Layland's critical-instant theorem is what makes the tractable cases tractable). The second meta-axis leaf on the QUANTITATIVE plane (after dp-28), landing where quantitative x liveness meet — and finding the intersection collapses to safety. NEW DATUM: the reduce/residue boundary here is not 'a type can vs cannot hold it' (most priors) but 'a const wall can hold it CHEAPLY vs only CONSERVATIVELY or INTRACTABLY' — the wall's soundness is never in doubt, only its COMPLETENESS-at-a-tractable-cost. WITNESS-TRAP (∥ dp-28's SloppyCounting Delta-f, unit-27's FACTOR, [[feedback_witness_type_not_unforgeable]]): a Schedulable certifies feasibility UNDER THE DECLARED WCETs — it never witnesses that the C_i are sound worst-case execution times (WCET estimation is itself a hard, separate discipline: cache/pipeline/interrupt effects); garbage WCET in, garbage schedulability out. Sibling the parked note pairs (Lipschitz robustness — |f(x)-f(y)| <= K|x-y|) is NOT built here: a Lipschitz constant K IS dp-28's global sensitivity Delta-f, so robustness would re-land on the dp sensitivity residue, not a new shape — mentioned, deliberately not seeded. Primitives: E0080 central (the utilization/per-task wall) + E0451 (the certificate seal); E0382 NOT recruited (feasibility is duplicable, ∥ leaf 32, INVERSE of dp-28's linear Budget); E0308 brand unused (no fresh-per-value provenance scope). Two garden primitives touched, no new one. Codes (E0080, E0451) VERIFIED by direct rustc with a real -o path (rustdoc does not machine-check ,EXXXX; E0080 is const-eval surfaced at evaluation and /dev/null can hide it — the leaf 27/29/30 rule). Standalone (imports nothing: schedulability is a general real-time notion, unrelated to corona-core's k-of-n Threshold or gf256). TOY: implicit-deadline periodic model only (D = T); RTA is the classic uniprocessor fixed-priority recurrence, NOT the arbitrary-deadline busy-period form; no sporadic release jitter, no blocking/priority-inheritance (no PCP/PIP), no multiprocessor (the NP-hard cases are DESCRIBED, not solved); the u128 common-denominator EDF wall overflows for large/many periods (documented). Models the ENFORCEMENT SKELETON of a schedulability discipline, not a real-time analysis tool. Not for real use."

# deadline-types is STANDALONE (imports nothing in the garden). Schedulability (the
# real-time WCET-vs-deadline question, utilization bounds, response-time analysis) is a
# general real-time-systems notion unrelated to corona-core's k-of-n Threshold or gf256.
# It is numerical-accuracy (leaf 32)'s parked cousin and the quantitative sharpening of
# arq-types (leaf 24)'s liveness — related by THEME, not by any shared surface, so it
# leans on no sibling.
