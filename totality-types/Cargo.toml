[package]
name = "totality-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 30 — termination/totality as typestate, and the garden's FIRST ESCAPE-HATCH residue: a guarantee bought not by ADDING type structure (a brand, a seal, a linear token, a wall) but by SUBTRACTING expressiveness — restricting to a total fragment the way Agda/Idris-total refuse general recursion (once that is the move, residue = the complement of the retained fragment almost by construction; the leaf's point is WHICH fragment Rust hands you free). Thesis: does termination reduce? reduce-half: STRUCTURAL recursion made a type invariant. A type-level Peano natural (Z, S<N>) carries the inductive structure; a SEALED Total trait implemented for S<N> ONLY WHEN N: Total (the inductive step REQUIRES the predecessor's proof, E0277) makes each recursive step descend on a STRICTLY SMALLER type — and because a finite type is a finite term, resolving Total down a Peano chain is a finite descent the compiler completes for any numeral you can WRITE, bottoming out at Z (budget-bounded, not unconditional — a deep chain overflows recursion_limit/E0275 at the default; detailed below). Sealing (a private supertrait, foreign impls blocked by E0277) makes descent-to-Z ENFORCED, not merely intended — the same discipline the leaf applies to Halted (E0451), and consistent with it. A value-level ILLUSTRATION runs a structural const fn (triangular) in the const evaluator — but the const evaluator is a WATCHDOG, NOT AN ORACLE: E0080 for recursion is 'reached the configured maximum number of stack frames', a STACK-FRAME BUDGET. A produced const value witnesses HALTING-WITHIN-BUDGET (necessary, not sufficient, for totality); an E0080 trip witnesses EXCEEDED-THE-BUDGET and does NOT distinguish non-termination from deep-but-finite — a structural, mathematically-terminating triangular(u64::MAX) trips the SAME E0080. The TYPE LEVEL is ALSO budget-bounded, not 'exact': resolving DEPTH for a deep Peano numeral overflows recursion_limit (E0275) just as the frame budget rejects a deep const fn. BOTH are sound-but-incomplete under a configurable recursion budget (E0275/recursion_limit for resolution, E0080 for const-eval); neither is a totality oracle. An E0451-sealed Halted<T> is minted only by a completed run — a witness-trap (cf. leaves 5/23/28): it attests THIS evaluation halted, never that the function is total for ALL inputs. residue: general recursion is UNDECIDABLE (Turing 1936; Rice 1953). Nothing in the type system rejects `fn diverge() -> u64 { loop {} }` — `loop {}` has type ! and coerces anywhere — so no type separates it from a total function; the reduce-half is bought by GIVING UP that expressiveness (Turing-completeness), and everything non-structural is the residue: general recursion, well-founded (non-structural) recursion needing a decreasing MEASURE the type cannot see, and the coinductive sibling — PRODUCTIVITY of infinite streams (a total language also demands guarded corecursion, a whole second obligation no value type here touches). THE BORROWED FLOOR (the new shape): the guarantee that the type-level structural descent terminates does NOT reduce to one of the four garden primitives (E0451/E0382/E0308/E0080) but appeals to a fact the leaf cannot deploy AS A TYPE because it is the substrate — the compiler's own STRUCTURAL CHECKER (a finite type is a finite term, so resolving Total down a Peano chain terminates for any numeral you can write). Be precise about strength: this is NOT 'trait-resolution totality' — trait resolution is sound-but-incomplete and budget-bounded (deep resolution overflows recursion_limit = E0275; a self-referential associated const is stopped by cycle detection = E0391), the SAME KIND of budget the const evaluator has, not an oracle. What is genuinely borrowed is weaker and honest: the compiler FINISHES CHECKING ANY STRUCTURAL DEFINITION YOU CAN WRITE because its budget scales with your syntax (raise the limit and it completes — a 128-deep numeral compiles at recursion_limit=512), whereas no budget checks a GENERAL recursion whose cost is a runtime value. Every prior leaf's guarantee rests on a primitive the leaf itself wields; totality's rests on the ground the whole garden already stands on, unencodable as a type ('the type checker halts' is presupposed by every type). So the reduce-half is real but BORROWED (the total fragment = exactly what the compiler can itself finish checking), and the residue (general recursion / undecidability) is precisely what lies OUTSIDE the substrate's totality — the garden's first residue that is a LIMIT OF THE SUBSTRATE rather than a fact about a value, and the first bought by subtraction not addition. Primitives touched: E0080 (the const-eval budget — a value-level illustration) + E0451 (the Halted seal); the structural REQUIREMENT and the SEAL both bite as E0277 (bound-not-satisfied, the same enforcement code as leaves 27/28, not a new primitive); E0382 and the brand honestly unused (no linearity to spend, no provenance scope to pen). Standalone. TOY: type-level Peano naturals + a handful of structural const fns, no general well-founded-recursion checker, no guardedness/productivity checker, no effect system — models Agda/Idris-total's structural-termination discipline in the fragment Rust's trait resolution and const evaluator already enforce, not a real totality checker. Not for real use."

# totality-types is STANDALONE (imports nothing in the garden). Its subject — the
# termination of recursion — is unrelated to corona-core's k-of-n Threshold, and it needs
# no backend: type-level Peano naturals and const fns are all it uses. It reaches for no
# sibling's surface deliberately: the escape-hatch residue is a NEW shape, and the
# reduction (structural descent enforced by trait resolution + const-eval) leans on the
# ONE substrate fact — the compiler's own totality — that no domain leaf can itself deploy.
[dependencies]
