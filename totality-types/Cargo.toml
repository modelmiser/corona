[package]
name = "totality-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 30 — termination/totality as typestate, and the garden's FIRST ESCAPE-HATCH residue: a guarantee bought not by ADDING type structure (a brand, a seal, a linear token, a wall) but by SUBTRACTING expressiveness — restricting to a total fragment the way Agda/Idris-total refuse general recursion. Thesis: does termination reduce? reduce-half: STRUCTURAL recursion type-checks as terminating. A type-level Peano natural (Z, S<N>) carries the inductive structure; a Total trait implemented for S<N> ONLY WHEN N: Total (the inductive step REQUIRES the predecessor's proof, E0277) makes each recursive step descend on a STRICTLY SMALLER type, so monomorphizing the recursion builds a finite call tree that MUST bottom out at Z — structural descent the compiler is forced to finish. In parallel, a total computation in Rust's compile-time fragment (a structural const fn) is run by the const evaluator: its const VALUE existing is the termination WITNESS, and non-termination trips the const-eval step limit (E0080, the static-config/dp wall now witnessing HALTING rather than a bound). An E0451-sealed Halted<T> is minted only by a completed run — a witness-trap (cf. leaves 5/23/28): it attests THIS evaluation halted, never that the function is total for ALL inputs. residue: general recursion is UNDECIDABLE (Turing 1936; Rice 1953). Nothing in the type system rejects `fn diverge() -> u64 { loop {} }` — `loop {}` has type ! and coerces anywhere — so no type separates it from a total function; the reduce-half is bought by GIVING UP that expressiveness (Turing-completeness), and everything non-structural is the residue: general recursion, well-founded (non-structural) recursion needing a decreasing MEASURE the type cannot see, and the coinductive sibling — PRODUCTIVITY of infinite streams (a total language also demands guarded corecursion, a whole second obligation no value type here touches). THE DEEP DISCLOSURE (the new shape — the META-APPEAL): the guarantee that structural recursion terminates does NOT reduce to one of the four garden primitives (E0451/E0382/E0308/E0080) but appeals to a FIFTH fact the leaf cannot deploy because it is the substrate — the COMPILER'S OWN totality (monomorphization and const-eval both terminate by construction/step-limit). Every prior leaf's guarantee rests on a primitive the leaf itself wields; totality's rests on the ground the whole garden already stands on, unencodable as a type. So the reduce-half is real but BORROWED (the total fragment = exactly what the compiler can itself finish checking), and the residue (general recursion / undecidability) is precisely what lies OUTSIDE the substrate's totality. Primitives touched: E0080 central (const-eval as the total sublanguage — a completed value witnesses halting-within-budget) + E0451 (the Halted seal); the structural REQUIREMENT bites as E0277 (bound-not-satisfied, the same enforcement code as leaves 27/28, not a new primitive); E0382 and the brand honestly unused (no linearity to spend, no provenance scope to pen). Standalone. TOY: type-level Peano naturals + a handful of structural const fns, no general well-founded-recursion checker, no guardedness/productivity checker, no effect system — models Agda/Idris-total's structural-termination discipline in the fragment Rust's const evaluator and monomorphizer already enforce, not a real totality checker. Not for real use."

# totality-types is STANDALONE (imports nothing in the garden). Its subject — the
# termination of recursion — is unrelated to corona-core's k-of-n Threshold, and it needs
# no backend: type-level Peano naturals and const fns are all it uses. It reaches for no
# sibling's surface deliberately: the escape-hatch residue is a NEW shape, and the
# reduction (structural descent enforced by monomorphization + const-eval) leans on the
# ONE substrate fact — the compiler's own totality — that no domain leaf can itself deploy.
[dependencies]
