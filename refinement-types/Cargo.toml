[package]
name = "refinement-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 31 — refinement types ({v: T | P(v)}: a base type carved by a predicate) as typestate, and the leaf that most explicitly draws the garden's own Corona<->Sol seam. Thesis: a refinement type FACTORS into a part Corona (the TYPE face) reduces and a part that is LITERALLY Sol's (the PROOF face) remit. reduce-half, in TWO partial reductions. (1) BOUNDARY ENFORCEMENT via E0451: Refined<T, P> is a sealed newtype (private fields) whose ONLY constructor runs P::holds(&v) and returns Option<Self> — so the seal makes 'every value of this type passed P at construction' TRUE rather than aspirational (this is the enforcement skeleton behind NonZeroU32 and every Rust smart constructor). (2) CLOSED-TERM DISCHARGE via E0080: for a CONSTANT (variable-free) term, a const fn predicate + a const assertion decides the predicate at compile time with NO runtime check — refine_const_positive(0) trips E0080 ('evaluation panicked: refinement violated'), a REAL static refinement, but ONLY for constants and ONLY for a bounded/non-recursive predicate (a recursive predicate inherits leaf 30's E0080-is-a-budget caveat). The moment the value depends on runtime input, discharge falls back to the runtime check (residue face 1) or the proof obligation (Sol). residue, THREE faces, the NEW SHAPE being the ARROW. (A) OPEN-TERM DISCHARGE: a real system proves forall v. path-condition => P(v) via an SMT solver with no runtime check; Rust's const evaluator decides only CLOSED terms — the forall-quantified discharge is Sol's remit (cf. crdt 15 / dp 28's 'proof obligation over a domain'). (B) PROPAGATION THROUGH OPERATIONS — THE ARROW-REFINEMENT RESIDUE (the leaf's headline, un-mapped): refinement-type systems type FUNCTIONS {v|P} -> {r|Q} and CHECK THE BODY PRESERVES the refinement, threading it through the dataflow; a sealed newtype captures only the BASE refinement {v|P} at construction and LOSES the ARROW — Positive + Positive returns a raw i64, not a Positive, so every operation drops the predicate and demands a fresh boundary check. Corona types the refined VALUE; it cannot type the refined FUNCTION. (C) THE ABSTRACTION / SIMULATION RELATION (the deepest): the most general refinement question is 'does a concrete IMPL refine an abstract SPEC?' — a simulation relation / abstraction function (data refinement, Hoare & He; refinement mappings, Abadi-Lamport), forall over REACHABLE STATES of a transition system, not just over values. No Rust type expresses 'impl M refines spec S'; that is a proof obligation — Sol's PROOF face. So a Refined<T,P> value is a SEALED RECEIPT THAT THE CHECK RAN ONCE, not a PROOF that P holds, and emphatically not a proof that any OPERATION preserves P. HONEST NUANCES baked in at seed: (i) the Predicate trait is deliberately OPEN / user-extensible (contrast leaf 30's SEALED Total) — refinements are user-defined; the unforgeability is purely in Refined's private fields, NOT in the predicate. A trivial predicate {v | true} yields a meaningless refinement: the seal attests the check RAN and RETURNED TRUE, never that the predicate is MEANINGFUL or CORRECT (GIGO — the witness-trap in refinement flavor, cf. leaf 5 / feedback_witness_type_not_unforgeable). (ii) the receipt is a CONSTRUCTION-TIME fact: for T with interior mutability the predicate can be invalidated after construction — the type tracks no mutation (another face of 'no propagation'); the refinement is over the value AS PRESENTED AT CONSTRUCTION. (iii) even the const discharge returns a PLAIN i64 you KNOW is positive, not a Positive-typed value — the discharge proves the predicate for the closed term but the PROOF IS NOT CARRIED IN THE TYPE, reinforcing the arrow residue. Primitives touched: E0451 central (the boundary seal) + E0080 (closed-term discharge); the ordinary bound P: Predicate<T> on Refined bites as E0277 (an enforcement code, NOT a new primitive, same as leaves 27/28/30); brand + E0382 honestly unused (no provenance scope to pen, no linearity to spend — a refinement is a Clone-able fact, not a use-once capability). Two garden primitives touched, no new one. Codes VERIFIED by direct rustc with a real -o path (rustdoc does not machine-check ,EXXXX; E0080 is const-eval surfaced at evaluation — leaf 27/29/30 rule). Standalone (imports nothing — refinement is a general structural notion, unrelated to corona-core's k-of-n Threshold or gf256; and a leaf drawing the Corona<->Sol boundary must not lean on the vocabulary it bounds). TOY: predicates are runtime bool checks, not logical formulas; NO SMT, NO arrow refinements, NO dataflow propagation, NO liquid-type inference, NO impl-refines-spec checking — models the ENFORCEMENT SKELETON of refinement types in the fragment Rust's seal + const evaluator already give you, not a real refinement-type checker. Not for real use."

# refinement-types is STANDALONE (imports nothing in the garden). Refinement ({v: T | P(v)})
# is a general structural notion, unrelated to corona-core's k-of-n Threshold or gf256; and
# this is the leaf that names where Corona (enforce-at-boundary) stops and Sol (discharge-forall)
# begins, so by design it leans on no sibling's surface — the boundary it draws must be drawn
# from the outside.
[dependencies]
