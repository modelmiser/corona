[package]
name = "dp-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 28 — a differential-privacy budget as typestate, and the garden's FIRST leaf on the QUANTITATIVE axis: every residue mapped by leaves 1-27 is BINARY (a property holds or it does not), whereas differential privacy is graded — a guarantee that holds 'to within epsilon'. The privacy budget is also the garden's first CONTINUOUS, DIVISIBLE resource: every prior resource is discrete (a k-of-n COUNT in leaf 1, a use-once CAPABILITY in leaf 5, an EPOCH in leaf 11), but epsilon is a real number that can be SPLIT into independently-spendable sub-budgets (sub-allocation — NOT parallel composition, which this toy does not model). The reduction is a three-way synthesis, no new primitive. (1) Budget non-duplication + sequential composition reduce to E0382: a Budget is linear (no Clone/Copy), run(self,..)->(Released,Budget) consumes it and returns a smaller one, so spending the same epsilon twice is a compile error — the exact choice Fuzz/DFuzz's LINEAR type systems make for privacy accounting. (2) The static budget CEILING reduces to E0080 when costs are compile-time-known: StaticBudget is a const fn whose overspend panics at const-eval, so sequential composition SUMS at compile time (60+60 micro-epsilon > 100 => error[E0080]) — static-config-types' wall, now depleting; a runtime-chosen epsilon falls back to the runtime check (the count residue). (3) The epsilon GUARANTEE itself does NOT reduce — noise calibrated to the query's true sensitivity is a proof obligation over the real domain (Sol's territory, parallel to crdt-types leaf 15) AND a witness-trap (parallel to unit-types' FACTOR): a miscalibrated Mechanism spends budget honestly but delivers no privacy; the type sees the accounting, never the calibration. NEW DATUM: E0382 makes the budget non-DUPLICABLE but not non-INFLATABLE — conservation under split is a body invariant, not a typed one. E0451 also used (Released is a sealed release token, minted only by a charged Budget); brand honestly unused. TOY: deterministic non-cryptographic jitter (NOT a real Laplace/Gaussian sample), no secure RNG, only sequential composition and sum-conserving sub-allocation (no true parallel composition, advanced composition, or RDP); the runtime budget is f64, so a sub-ULP charge does not deplete it (integer units are the honest fix — StaticBudget uses u32). Not for real use."

# dp-types is STANDALONE (imports nothing in the garden). Its subject — a privacy
# budget as a linear resource — is unrelated to corona-core's k-of-n Threshold, and it
# needs no backend: the invariant is structural (a linear f64 budget threaded through
# queries), with no unforgeability, hardness, or coordination. It leans on no sibling's
# surface deliberately: this is the first leaf on a NEW axis (quantitative/graded), and
# leaning on the binary-axis crypto leaves would entangle "the reduction reaches a graded
# domain" with the leaves it is trying to generalize past.
[dependencies]
