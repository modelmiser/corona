[package]
name = "deadlock-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 29 — a compile-time lock hierarchy as typestate, and the garden's FIRST EMERGENT/HOLISTIC residue: a defect invisible in every part in isolation, visible only in the whole. Every residue mapped by leaves 1-28 concerns a single value or witness (a k-of-n COUNT, a FRESHNESS, a COST, an epsilon CALIBRATION); a deadlock is structurally different — no individual lock acquisition is wrong, the wait-for CYCLE is a property of the global acquisition graph across threads. reduce-half: a phantom lock LEVEL (const generic) plus a const-eval ordering wall (E0080) enforce the classic Havender/Dijkstra resource-ordering discipline — a lock may be acquired only at a STRICTLY HIGHER level than any already held, so every acquisition sequence is strictly level-increasing and a strict total order admits no cycle. Deadlock-freedom is therefore CORRECT BY CONSTRUCTION (the emergent bad state is untypeable), not checked by any local fact — the garden's first unreachability-by-construction result rather than a sealed witness of a check. Three mechanisms compose: E0080 walls the ACQUIRE order; E0451 seals the Guard so a level cannot be forged to skip the wall (exactly static-config-types' seal+wall pairing); and because acquire takes &mut self, a child guard mutably borrows its parent, so the borrow checker forbids dropping an outer guard while an inner one lives (E0505) — the RELEASE order (LIFO) for free. NEW DATUM: leaves 11/17 found the generative brand RELATES but does not ORDER (two brands are unordered); deadlock-freedom NEEDS a total order, so this leaf reaches past the unordered brand to ordered const-generic LEVELS = E0080. residue: DYNAMIC COMPOSITION — a level must be a compile-time constant, so runtime-selected locks (the canonical bank-account transfer, where which lock is 'higher' is runtime data) cannot be statically leveled and fall back to a RUNTIME canonical order (lock the lower id first); two locks at the SAME level cannot be nested at all, which is itself the tell that the discipline demands a static level assignment. Distinct from leaf 7's INHERITED obligations (which propagate up from components) — this obligation is NEW at the whole. Two primitives touched (E0080 + E0451), no new one; the brand and E0382 honestly unused. TOY: models the lock-ordering discipline (the compile-time analog of the Linux kernel's runtime lockdep, restricted to statically-known levels), not a production lock — no try-lock/timeout, condition variables, lock-free structures, priority inversion, or reentrancy; single process. Not for real use."

# deadlock-types is STANDALONE (imports nothing in the garden). Its subject — an
# acquisition-order discipline over locks — is unrelated to corona-core's k-of-n
# Threshold, and it needs no backend: it wraps std's Mutex directly. It leans on no
# sibling's surface deliberately: the emergent/holistic residue is a NEW shape, and the
# reduction (const-generic levels + a const-eval wall) is a mechanism the crypto leaves
# never reach for, precisely because the brand they do use cannot order (leaves 11/17).
[dependencies]
