[package]
name = "unit-types"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Corona leaf 27 — dimensional analysis / units of measure as typestate, and the first leaf whose domain lies outside BOTH cryptography AND distributed systems, its guarantee resting on nothing but the type structure (no adversary, secret, hardness, probability, or coordination). Earlier leaves shed some of that machinery but not all: bloom-types (16) is local but its false-positive bound rests on a uniform-hashing PROBABILITY assumption (not collision hardness — toy FNV suffices); crdt-types (15) is non-crypto and coordination-free but a distributed (replicated) domain; static-config-types (6) is structural but walls a k-of-n threshold (a distributed primitive). None sits outside both domains at once. Dimensional consistency reduces ENTIRELY to the E0308 brand — and this is the first leaf to emit the LITERAL E0308 the charter is named for: every prior brand leaf (vss/merkle/mss/accumulator/translog/commit) uses a generative-lifetime brand whose real diagnostic is E0521, whereas a dimension marker is a STATIC NOMINAL type parameter, so a mismatch is decided by type equality (Quantity<Length>.plus(Quantity<Time>) => E0308). But it SPLITS: the brand pins the DIMENSION, never the SCALE/UNIT within it — meters and feet are both Quantity<Length>, so meters(1.0)+feet(1.0) type-checks to physical nonsense (the Mars Climate Orbiter class). Scale is a runtime residue, closable only by folding the unit INTO the brand (Scaled<D,U>) at a composability cost — and even then the conversion FACTOR is data a wrong value type-checks past (witness-trap: the brand forces a conversion to be EXPLICIT, never CORRECT). E0451/E0382/E0080 honestly unused. TOY, not production."

# unit-types is STANDALONE (imports nothing in the garden). It is a DOMAIN-DEPARTURE
# leaf — the first outside crypto/distributed-systems — and such a leaf must stand on
# its own: leaning on a sibling's surface would entangle "the reduction is
# domain-agnostic" with the crypto leaves it is trying to generalize past. Its subject
# (dimensions of physical quantities) is unrelated to corona-core's k-of-n Threshold,
# and it needs no backend at all — the invariant is purely structural (type tags on
# f64 magnitudes), with no unforgeability, hardness, or coordination anywhere.
[dependencies]
