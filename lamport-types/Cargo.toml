[package]
name = "lamport-types"
version = "0.1.0"
edition = "2021"
description = "Corona leaf 5 — Lamport one-time signatures as typestate. TOY: a type-discipline demonstration, not production crypto."
license = "MIT"

# Deliberately depends on nothing — not even `corona-core`. Like `merkle-types`, this
# leaf shares the garden's *vocabulary* (here the E0382 move-linearity primitive and
# the E0451 seal), not any of the core's shared *modules*: it needs neither
# `Threshold` (a signature is single-signer, not k-of-n) nor `gf256` (hash-based, not
# field arithmetic).
[dependencies]
